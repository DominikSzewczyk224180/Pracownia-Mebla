<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Przekierowanie — Pracownia Mebla</title>
  <script>
    var path = window.location.pathname.toLowerCase()
      .replace(/^\//, '').replace(/\/$/, '');

    // Do NOT redirect static file requests (favicon, images, css, js, etc.)
    if (/\.(ico|png|jpg|jpeg|gif|svg|webp|css|js|json|xml|txt|webmanifest|woff|woff2|ttf|eot|map)$/i.test(path)) {
      // Real 404 for a missing file — just stop, don't redirect
    } else {
      // Old WordPress URL patterns → new #section
      var map = {
        'kontakt': '#kontakt',
        'o-pracowni': '#o-nas',
        'kuchnie-nowoczesne': '#oferta',
        'kuchnie-klasyczne': '#oferta',
        'kuchnie': '#oferta',
        'szafy': '#oferta',
        'stoly-i-biurka': '#oferta',
        'meble-nietypowe': '#oferta',
        'fotele-i-sofy': '#oferta',
        'komody-polki-i-regaly': '#oferta',
        'produkty': '#oferta',
        'portfolio': '#oferta',
        'projekty-3d': '#oferta',
        'studio-projektowe': '#oferta',
        'realizacje': '#realizacje',
        'galeria': '#realizacje',
        'opinie': '#opinie',
        'aktualnosci': '#aktualnosci'
      };

      // Strip index.php and .html
      var cleanPath = path
        .replace(/\.html$/, '')
        .replace(/index\.php\/?/, '');

      var target = null;
      var segments = cleanPath.split('/').filter(Boolean);

      for (var i = segments.length - 1; i >= 0; i--) {
        if (map[segments[i]]) {
          target = map[segments[i]];
          break;
        }
      }

      if (target) {
        window.location.replace('/' + target);
      } else {
        window.location.replace('/');
      }
    }
  </script>
  <style>
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: #faf9f6;
      color: #2d2d2d;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: 1.2rem; font-weight: 500; color: #1b7367; margin-bottom: 0.5rem; }
    p { font-size: 0.95rem; color: #6b6b6b; line-height: 1.6; }
    a { color: #1b7367; text-decoration: none; font-weight: 500; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <noscript>
    <div>
      <h1>Strona została przeniesiona</h1>
      <p>Szukana podstrona nie istnieje. Zapraszamy na <a href="/">stronę główną Pracowni Mebla</a>.</p>
    </div>
  </noscript>
</body>
</html>
