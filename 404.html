<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Przekierowanie — Pracownia Mebla</title>
  <script>
    // Old WordPress URL patterns → new #section
    var map = {
      'kontakt': '#kontakt',
      'o-pracowni': '#o-nas',
      'kuchnie-nowoczesne': '#oferta',
      'kuchnie-klasyczne': '#oferta',
      'kuchnie': '#oferta',
      'szafy': '#oferta',
      'stoly-i-biurka': '#oferta',
      'meble-nietypowe': '#oferta',
      'fotele-i-sofy': '#oferta',
      'komody-polki-i-regaly': '#oferta',
      'produkty': '#oferta',
      'portfolio': '#oferta',
      'projekty-3d': '#oferta',
      'studio-projektowe': '#oferta',
      'realizacje': '#realizacje',
      'galeria': '#realizacje',
      'opinie': '#opinie',
      'aktualnosci': '#aktualnosci'
    };

    // Get full path, strip slashes and .html
    var path = window.location.pathname.toLowerCase()
      .replace(/^\//, '').replace(/\/$/, '')
      .replace(/\.html$/, '')
      .replace(/index\.php\/?/, '');  // strip index.php/

    // Try to find a match in any part of the path
    var target = null;
    var segments = path.split('/').filter(Boolean);

    // Check each segment from last to first (most specific first)
    for (var i = segments.length - 1; i >= 0; i--) {
      if (map[segments[i]]) {
        target = map[segments[i]];
        break;
      }
    }

    // Redirect
    window.location.replace('/' + (target || ''));
  </script>
  <style>
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: #faf9f6;
      color: #2d2d2d;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: 1.2rem; font-weight: 500; color: #1b7367; margin-bottom: 0.5rem; }
    p { font-size: 0.95rem; color: #6b6b6b; line-height: 1.6; }
    a { color: #1b7367; text-decoration: none; font-weight: 500; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <noscript>
    <div>
      <h1>Strona została przeniesiona</h1>
      <p>Szukana podstrona nie istnieje. Zapraszamy na <a href="/">stronę główną Pracowni Mebla</a>.</p>
    </div>
  </noscript>
</body>
</html>
